<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
        }
        h1 { font-size: 24px; margin: 15px 0 5px 0; color: #4CAF50; letter-spacing: 1px; }
        #score { font-size: 18px; margin-bottom: 10px; font-weight: bold; }
        
        canvas {
            border: 3px solid #388E3C;
            background-color: #0b140b;
            max-width: 90vw;
            max-height: 40vh;
            aspect-ratio: 1 / 1;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
            border-radius: 10px;
        }

        /* STANDARD MLBB SIZE JOYSTICK */
        .joystick-container {
            position: relative;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.04);
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .joystick-stick {
            position: absolute;
            width: 65px;
            height: 65px;
            background: radial-gradient(circle, #4CAF50 0%, #1B5E20 100%);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 5px 12px rgba(0,0,0,0.6);
            transition: transform 0.03s linear;
        }

        /* BREATHING EFFECT NI VANNI */
        .vanni-signature {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #4CAF50;
            animation: breathingLED 3s ease-in-out infinite;
        }

        @keyframes breathingLED {
            0% {
                opacity: 0.15;
                text-shadow: 0 0 2px rgba(76, 175, 80, 0.1);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 12px #4CAF50, 0 0 20px #4CAF50;
            }
            100% {
                opacity: 0.15;
                text-shadow: 0 0 2px rgba(76, 175, 80, 0.1);
            }
        }
    </style>
</head>
<body>

    <h1>Snake</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="joystick-container" id="joystickBounds">
        <div class="joystick-stick" id="stick"></div>
    </div>

    <div class="vanni-signature">VANNI</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        
        let food = {x: 5, y: 5};
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval;

        let nextDx = 1;
        let nextDy = 0;

        const crushName = ["H", "E", "L", "L", "O", "W"];
        let letterIndex = 0;

        function startGame() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, 140); 
        }

        function drawGame() {
            dx = nextDx;
            dy = nextDy;

            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;

            const head = {x: nextX, y: nextY};

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById("score").innerText = "Score: " + score;
                letterIndex = (letterIndex + 1) % crushName.length;
                generateFood();
            } else {
                snake.pop();
            }

            ctx.fillStyle = "#0b140b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                const xPos = snake[i].x * gridSize + gridSize / 2;
                const yPos = snake[i].y * gridSize + gridSize / 2;
                const radius = gridSize / 2 - 1;

                if (i === 0) {
                    ctx.beginPath();
                    ctx.arc(xPos, yPos, radius + 2, 0, Math.PI * 2);
                    ctx.fillStyle = "#66BB6A"; 
                    ctx.fill();
                    ctx.closePath();

                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(xPos - 4, yPos - 4, 2, 0, Math.PI * 2);
                    ctx.arc(xPos + 4, yPos - 4, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                    
                    ctx.fillStyle = "#000000";
                    ctx.beginPath();
                    ctx.arc(xPos - 4, yPos - 4, 1, 0, Math.PI * 2);
                    ctx.arc(xPos + 4, yPos - 4, 1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                } else {
                    ctx.beginPath();
                    let bodyRadius = radius - (i * 0.1);
                    if (bodyRadius < 4) bodyRadius = 4;
                    ctx.arc(xPos, yPos, bodyRadius, 0, Math.PI * 2);
                    ctx.fillStyle = i % 2 === 0 ? "#4CAF50" : "#388E3C";
                    ctx.fill();
                    ctx.closePath();
                }
            }

            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;
            
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize / 2 - 1, 0, Math.PI * 2);
            ctx.fillStyle = "#E53935"; 
            ctx.fill();
            ctx.closePath();

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(crushName[letterIndex], foodX, foodY);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            for(let i=0; i<snake.length; i++) {
                if(food.x === snake[i].x && food.y === snake[i].y) {
                    generateFood();
                    break;
                }
            }
        }

        const joystick = document.getElementById("joystickBounds");
        const stick = document.getElementById("stick");
        let joystickRect = joystick.getBoundingClientRect();

        window.addEventListener('resize', () => {
            joystickRect = joystick.getBoundingClientRect();
        });

        joystick.addEventListener("touchstart", handleTouch, {passive: false});
        joystick.addEventListener("touchmove", handleTouch, {passive: false});
        joystick.addEventListener("touchend", () => {
            stick.style.transform = `translate(0px, 0px)`;
        }, {passive: false});

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0]; 
            
            const centerX = joystickRect.left + joystickRect.width / 2;
            const centerY = joystickRect.top + joystickRect.height / 2;

            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const maxRadius = 45;

            if (distance > maxRadius) {
                deltaX = (deltaX / distance) * maxRadius;
                deltaY = (deltaY / distance) * maxRadius;
            }

            stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

            if (distance > 20) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 0 && dx !== -1) { nextDx = 1; nextDy = 0; }
                    else if (deltaX < 0 && dx !== 1) { nextDx = -1; nextDy = 0; }
                } else {
                    if (deltaY > 0 && dy !== -1) { nextDx = 0; nextDy = 1; }
                    else if (deltaY < 0 && dy !== 1) { nextDx = 0; nextDy = -1; }
                }
            }
        }

        generateFood();
        startGame();
    </script>
</body>
</html>
